<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste GitHub API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .info { color: #17a2b8; }
        #results { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste da API GitHub</h1>
        <p>Este teste verificará se a integração com a API do GitHub está funcionando corretamente.</p>
        
        <button onclick="testarAPI()">Executar Teste</button>
        
        <div id="results"></div>
    </div>

    <script>
        async function testarAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p class="info">🔄 Testando...</p>';
            
            try {
                const response = await fetch('https://api.github.com/users/LucasPradoLPS/repos?sort=updated&per_page=10&type=public', {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'User-Agent': 'Portfolio-Website'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status} - ${response.statusText}`);
                }
                
                const repos = await response.json();
                
                const excludedRepos = ['ana']; // Lista de repositórios excluídos
                const publicRepos = repos.filter(repo => !repo.private);
                const privateRepos = repos.filter(repo => repo.private);
                const filteredRepos = repos.filter(repo => 
                    !repo.fork && 
                    !repo.archived && 
                    !repo.private &&
                    !excludedRepos.includes(repo.name.toLowerCase())
                );
                
                const excludedFound = repos.filter(repo => excludedRepos.includes(repo.name.toLowerCase()));
                
                resultsDiv.innerHTML = `
                    <h3 class="success">✅ Teste Bem-sucedido!</h3>
                    <p><strong>Total de repositórios:</strong> ${repos.length}</p>
                    <p><strong>📊 Repositórios públicos:</strong> ${publicRepos.length} | <strong>Privados:</strong> ${privateRepos.length}</p>
                    ${excludedFound.length > 0 ? `<p><strong>🚫 Repositórios excluídos:</strong> ${excludedFound.map(r => r.name).join(', ')}</p>` : ''}
                    <p><strong>Repositórios válidos (públicos, não-fork, não-arquivado, não-excluído):</strong> ${filteredRepos.length}</p>
                    <h4>📋 Lista de Repositórios Válidos:</h4>
                    <ul>
                        ${filteredRepos.map(repo => `
                            <li>
                                <strong>${repo.name}</strong><br>
                                <small>${repo.description || 'Sem descrição'}</small><br>
                                <small>Linguagem: ${repo.language || 'N/A'} | ⭐ ${repo.stargazers_count}</small>
                            </li>
                        `).join('')}
                    </ul>
                `;
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <h3 class="error">❌ Erro no Teste</h3>
                    <p><strong>Erro:</strong> ${error.message}</p>
                    <p>Verifique:</p>
                    <ul>
                        <li>Conexão com a internet</li>
                        <li>CORS habilitado no servidor</li>
                        <li>Limite de taxa da API GitHub (60 requests/hora sem autenticação)</li>
                    </ul>
                `;
            }
        }
    </script>
</body>
</html>
