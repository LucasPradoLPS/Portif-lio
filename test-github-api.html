<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste GitHub API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .loading { color: blue; }
        .error { color: red; }
        .success { color: green; }
        .repo { border: 1px solid #ddd; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <h1>Teste GitHub API</h1>
    <button onclick="testAPI()">Testar API do GitHub</button>
    <div id="result">Clique no botão para testar</div>

    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="loading">🔄 Carregando...</div>';
            
            try {
                console.log('Fazendo requisição para GitHub API...');
                
                const response = await fetch('https://api.github.com/users/LucasPradoLPS/repos?sort=updated&per_page=10&type=public', {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'User-Agent': 'Portfolio-Website'
                    }
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const repos = await response.json();
                console.log('Repositórios encontrados:', repos.length);
                console.log('Dados dos repos:', repos);
                
                let html = `<div class="success">✅ Sucesso! Encontrados ${repos.length} repositórios:</div>`;
                
                repos.slice(0, 5).forEach(repo => {
                    html += `
                        <div class="repo">
                            <h3>${repo.name}</h3>
                            <p><strong>Descrição:</strong> ${repo.description || 'Sem descrição'}</p>
                            <p><strong>Linguagem:</strong> ${repo.language || 'N/A'}</p>
                            <p><strong>Stars:</strong> ${repo.stargazers_count}</p>
                            <p><strong>URL:</strong> <a href="${repo.html_url}" target="_blank">${repo.html_url}</a></p>
                            <p><strong>Privado:</strong> ${repo.private ? 'Sim' : 'Não'}</p>
                            <p><strong>Fork:</strong> ${repo.fork ? 'Sim' : 'Não'}</p>
                        </div>
                    `;
                });
                
                if (repos.length > 5) {
                    html += `<p>... e mais ${repos.length - 5} repositórios</p>`;
                }
                
                result.innerHTML = html;
                
            } catch (error) {
                console.error('Erro na API:', error);
                result.innerHTML = `
                    <div class="error">❌ Erro: ${error.message}</div>
                    <p>Verifique o console para mais detalhes.</p>
                `;
            }
        }
    </script>
</body>
</html>
